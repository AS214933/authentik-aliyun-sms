services:
  authentik-aliyun-sms:
    image: ghcr.io/as214933/authentik-aliyun-sms:latest
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      AUTH_TOKEN: "change-me"
      ALIYUN_ACCESS_KEY_ID: "${ALIYUN_ACCESS_KEY_ID}"
      ALIYUN_ACCESS_KEY_SECRET: "${ALIYUN_ACCESS_KEY_SECRET}"
      ALIYUN_REGION_ID: "${ALIYUN_REGION_ID:-cn-hongkong}"
      ALIYUN_ENDPOINT: "${ALIYUN_ENDPOINT:-dysmsapi-xman.cn-hongkong.aliyuncs.com}"
      ALIYUN_SMS_MODE: "auto"
      ALIYUN_SMS_SIGN_NAME: "${ALIYUN_SMS_SIGN_NAME}"
      ALIYUN_SMS_TEMPLATE_CODE: "${ALIYUN_SMS_TEMPLATE_CODE}"
      ALIYUN_SMS_TEMPLATE_PARAM: "code"
      ALIYUN_SMS_FROM: "${ALIYUN_SMS_FROM:-authentik}"
